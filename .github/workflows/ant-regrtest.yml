# Run ant regrtest on Jython 2.7 (GitHub action)

name: ant regrtest 2.7

on:
  push:
    branches: [ 2.7.bison ]
  pull_request:
    branches: [ 2.7.bison ]

permissions:
  contents: read


jobs:
  regrtest:
    strategy:
      matrix:
        os: [macos-15-intel, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - run: echo "Branch ${{ github.ref }} of repository ${{ github.repository }}."

      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Ant
        run: ant -noinput -buildfile build.xml

      - name: Regression tests
        run: ./dist/bin/jython -m test.regrtest -e
