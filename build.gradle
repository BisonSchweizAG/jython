plugins {
  id 'java-library'
  id 'antlr'
}


repositories {
  mavenCentral()
}

java {
  sourceCompatibility = JavaVersion.VERSION_21
  withSourcesJar()
  withJavadocJar()
}


dependencies {
  antlr libs.antlr
  implementation(libs.guava)
}

tasks.named("generateGrammarSource").configure {
    // Set the target package for generated code
    packageName = "org.python.antlr"
}